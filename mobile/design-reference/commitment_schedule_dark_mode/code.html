<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary outline-none py-xs font-timer-numeric text-timer-numeric text-on-surface transition-colors" type="time" value="18:00" style="box-sizing: border-box;">
</div>
</div>
</section>
<!-- Section 2: Days Selector -->

<span class="text-xs font-medium text-primary">5 Days Selected</span>
</div>
<div class="flex justify-between gap-2">
<!-- Day buttons -->
<button class="flex-1 aspect-square glass-card rounded-full flex items-center justify-center font-label-caps text-xs transition-all duration-300 border border-white/5 hover:border-primary active:scale-90" onclick="toggleDay(this)">M</button>

<button class="flex-1 aspect-square rounded-full flex items-center justify-center font-label-caps text-xs active-day transition-all duration-300 active:scale-90 shadow-lg shadow-primary/20" onclick="toggleDay(this)">T</button>

<script>
        // Micro-interactions for Day Toggles
        function toggleDay(btn) {
            btn.classList.toggle('active-day');
            btn.classList.toggle('glass-card');
            btn.classList.toggle('border-white/5');
            btn.classList.toggle('shadow-lg');
            btn.classList.toggle('shadow-primary/20');
        }

        // Slider Value Update
        const slider = document.getElementById('duration-slider');
        const display = document.getElementById('duration-val');

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            display.textContent = `${val} ${val == 1 ? 'Hour' : 'Hours'}`;
        });

        // Add subtle parallax/movement to the dot grid on mouse move (desktop only)
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                const dots = document.querySelector('.dot-grid');
                const x = (e.clientX / window.innerWidth) * 15;
                const y = (e.clientY / window.innerHeight) * 15;
                dots.style.backgroundPosition = `${x}px ${y}px`;
            });
        }
    </script>
