<!-- Verification Logic Simulation -->
<script>
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.querySelector('h1');
        const statusSubtext = document.querySelector('p');
        
        const steps = [
            { width: '25%', title: 'Extracting metadata...', sub: 'Validating timestamps and geolocation tags.' },
            { width: '50%', title: 'Scanning pixels...', sub: 'AI is identifying objects and environmental context.' },
            { width: '85%', title: 'Finalizing verification...', sub: 'Syncing with your global accountability ledger.' },
            { width: '100%', title: 'Commitment Verified!', sub: 'Your streak has been safely updated to 13 days.' }
        ];

        let currentStep = 0;
        
        function updateProgress() {
            if (currentStep < steps.length) {
                const step = steps[currentStep];
                progressBar.style.width = step.width;
                statusText.innerText = step.title;
                statusSubtext.innerText = step.sub;
                
                if (currentStep === steps.length - 1) {
                    const orb = document.querySelector('.orb-glow');
                    const coreIcon = document.querySelector('.animate-pulse');
                    orb.classList.remove('bg-primary-container');
                    orb.classList.add('bg-tertiary-container');
                    coreIcon.classList.remove('text-primary');
                    coreIcon.classList.add('text-tertiary');
                }

                currentStep++;
                setTimeout(updateProgress, 2500);
            }
        }

        setTimeout(updateProgress, 1500);
    </script>
