<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(186, 195, 255, 0.1);
        }
        .capture-ring {
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .capture-ring:active {
            transform: scale(0.92);
            box-shadow: 0 0 0 8px rgba(186, 195, 255, 0.4);
        }
        .camera-overlay {
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.4) 100%);
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s infinite ease-in-out;
        }
    </style>

<body class="bg-background text-on-background overflow-hidden font-body-md selection:bg-primary/30">
<!-- Full Screen Camera View Mockup -->
<div class="fixed inset-0 w-full h-full z-0 overflow-hidden">
<div class="w-full h-full bg-cover bg-center transition-transform duration-700 scale-105" data-alt="A POV first-person perspective photograph of a minimalist morning ritual scene. A sleek ceramic mug of black coffee and a neatly arranged journal sit on a light-colored wooden table bathed in soft, natural morning sunlight streaming from a side window. The overall aesthetic is calm, disciplined, and high-fidelity, following a professional dark-mode design system with deep shadows and pristine focus. The composition is clean and centered for a verification capture interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuByvhBJhgqkJydqu2gjlgQmv3QLX-BdoxjzCSJBw8rNYAlAumiCwNqZTj_qYYTX_B8m-hLYXxolwM424pZYS2lfDVfbEYzP5YeF318BEqaqpeQJfI5ygFPBFL5blFoeGopUlTpfRcVg6mjZS1BRUBVRw5GSSRChSS-VUnM3olyOJYj6jgBHS9WsDS3fObMbo5FNCUwVllyjsqiOmKLoVL-sYYzu9P4eTyG065QTw1C7SF84dcd4ls6fezSOEagSEr7p_MBPCYjaFZ8')">
</div>
<!-- Camera Lens/Vignette Overlay -->
<div class="absolute inset-0 camera-overlay pointer-events-none"></div>
</div>
<!-- Interface Chrome -->
<div class="relative z-10 flex flex-col h-screen justify-between p-margin-edge">
<!-- Top Navigation / Tip -->
<header class="flex justify-between items-start pt-sm">
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel text-on-surface hover:bg-white/10 transition-all active:scale-90" onclick="window.history.back()">
<span class="material-symbols-outlined">close</span>
</button>
<div class="flex flex-col items-center gap-xs">
<div class="glass-panel px-6 py-2 rounded-full border border-primary/20">
<p class="font-label-caps text-label-caps text-primary tracking-[0.2em]">Capture your morning ritual</p>
</div>
<span class="text-[10px] font-label-caps text-on-surface-variant/60 uppercase tracking-widest mt-1">Verification Mode</span>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel text-on-surface hover:bg-white/10 transition-all">
<span class="material-symbols-outlined">flash_off</span>
</button>
</header>
<!-- Main Viewfinder Guides (Minimalist) -->
<main class="flex-grow flex items-center justify-center">
<div class="w-64 h-64 border border-white/10 rounded-xl relative pointer-events-none">
<div class="absolute -top-1 -left-1 w-6 h-6 border-t-2 border-l-2 border-primary/40 rounded-tl-lg"></div>
<div class="absolute -top-1 -right-1 w-6 h-6 border-t-2 border-r-2 border-primary/40 rounded-tr-lg"></div>
<div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-2 border-l-2 border-primary/40 rounded-bl-lg"></div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-2 border-r-2 border-primary/40 rounded-br-lg"></div>
</div>
</main>
<!-- Bottom Controls -->
<footer class="flex flex-col items-center gap-lg pb-xl">
<div class="flex items-center gap-xl">
<!-- Gallery Preview -->
<div class="w-12 h-12 rounded-lg border border-white/20 overflow-hidden opacity-60 hover:opacity-100 transition-opacity cursor-pointer">
<div class="w-full h-full bg-cover bg-center" data-alt="A tiny thumbnail of a previously captured verification photo, showing a blurred minimalist workspace with a laptop and a small plant under cool, professional lighting." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDMqcCFt54aGsidAOCtxYf5DWx8dssSJ_MUzcMHpEexW0UwuMjvYDumeOnCNQ1AaD7AdoYg4DCrnLne7WG8ak4WekavY8NXGdR1AGGLcV7A_90K9zWJviS6wIC8BX-GeYo5I92exNhgcpjijLeZGqGoeG8AsJRZiOHu-V83cdpLoLVE-FGObZzRKmaQftPVeRqGsVwqyvQ0Y-A0v27XGvX3HdKhpIBaofAbaW2DJBTo_p4E8Nyawf2P0Z5TBfm8zbec1yfpI8bp5ms')"></div>
</div>
<!-- Main Capture Button -->
<div class="relative group">
<!-- Outer Glow Orb -->
<div class="absolute inset-0 bg-primary/20 blur-[30px] rounded-full animate-pulse-soft"></div>
<button class="relative w-20 h-20 rounded-full glass-panel flex items-center justify-center capture-ring group-hover:bg-white/10 border-2 border-white/30" id="capture-btn">
<div class="w-16 h-16 rounded-full bg-white/10 border border-white/40 flex items-center justify-center">
<div class="w-14 h-14 rounded-full bg-white transition-all group-active:scale-95"></div>
</div>
</button>
</div>
<!-- Switch Camera -->
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel text-on-surface opacity-60 hover:opacity-100 transition-all">
<span class="material-symbols-outlined">flip_camera_ios</span>
</button>
</div>
<!-- Footer Text -->
<div class="flex items-center gap-base text-on-surface-variant/50">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="font-label-caps text-[10px] tracking-widest uppercase">Secured End-to-End Verification</span>
</div>
</footer>
</div>
<!-- Flash Effect Layer -->
<div class="fixed inset-0 bg-white z-50 pointer-events-none opacity-0" id="flash-overlay"></div>
<script>
        const captureBtn = document.getElementById('capture-btn');
        const flashOverlay = document.getElementById('flash-overlay');

        captureBtn.addEventListener('click', () => {
            // Trigger Flash
            flashOverlay.style.transition = 'none';
            flashOverlay.style.opacity = '1';
            
            setTimeout(() => {
                flashOverlay.style.transition = 'opacity 0.8s ease-out';
                flashOverlay.style.opacity = '0';
            }, 50);

            // Simulate Shutter Sound / Haptic
            if (window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }

            // Logic for capture would go here
            console.log('Verification image captured');
        });

        // Simple mouse tracking for a subtle lens shift effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            const cameraBg = document.querySelector('[data-alt*="morning ritual"]');
            if(cameraBg) {
                cameraBg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
            }
        });
    </script>
</body></html>
