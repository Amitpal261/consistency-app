            animation: pulse 8s infinite ease-in-out;

<body class="text-on-background min-h-screen flex flex-col font-body-md text-body-md selection:bg-primary/30">

</button>
<!-- Secondary Support Metric (Minimalist) -->

<!-- Floating Action Row (Suppressed as per rules for focused/empty state, but adding captured secondary logic) -->
<!-- The prompt asked for Primary CTA in center, so we skip the FAB row to prioritize the 'Create Your First' button -->
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const orb = document.querySelector('.orb-pulse');
            
            // Add mouse-follow subtle displacement for depth
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX - window.innerWidth / 2) / 50;
                const y = (e.clientY - window.innerHeight / 2) / 50;
                if (orb) {
                    orb.parentElement.style.transform = `translate(${x}px, ${y}px)`;
                }
            });

            // Smooth entrance for cards
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 400 + (index * 150));
            });
        });
    </script>
