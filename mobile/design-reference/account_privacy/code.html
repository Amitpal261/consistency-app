<style>

            -webkit-backdrop-filter: blur(20px);

<body class="bg-background text-on-background min-h-screen font-body-md text-body-md overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Background Canvas -->
<div class="fixed inset-0 dot-grid -z-10"></div>
<div class="fixed top-[-10%] left-1/2 -translate-x-1/2 w-[500px] h-[500px] orb-glow opacity-30 -z-10"></div>
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-edge py-sm bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30">
<div class="flex items-center gap-base">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200">arrow_back</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-semibold text-on-surface">Settings</h1>
</div>
<div class="text-primary font-label-caps text-label-caps bg-primary-container/20 px-base py-xs rounded-full">
            12d Streak
        </div>
</header>
<!-- Main Content -->
<main class="pt-xl pb-xl px-margin-edge max-w-2xl mx-auto space-y-md">
<!-- Profile Section -->

<h2 class="font-label-caps text-label-caps text-outline mb-base px-base">ACCOUNT IDENTITY</h2>
<div class="glass-card rounded-lg p-md space-y-md">
<div class="flex items-center gap-md">
<div class="relative w-16 h-16 rounded-full overflow-hidden border-2 border-primary/30">
<img class="w-full h-64 object-cover" data-alt="A professional studio portrait of a focused individual in a minimalist setting, softly lit with cool blue tones and deep shadows. The aesthetic is clean and modern, mirroring a high-end digital interface with a calm, disciplined atmosphere. Sharp focus on eyes and subtle facial details against a dark neutral background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAiuKwCA8_O1L3EzCaEay6mHgGHIoD4m-EAJnVEcSQpqAAWjq4qncwTUQNt276jrgqDlRaGVoA2jjlxvVfCwaShwqVXzyWJKSV-JwXOdQT7Q0mW274lxdF2LdTqJ6pDi0B7WMk3TuUAuGzwkbxd3IyFxw3GAoXpI8Pw7mTTkDAzKW8tZhxrxP6cXvedyMIjJuj1tpI-m9_WohyKiMoru1ffKArSgH_Ah6i1UQFKLTobUKopSGH6LscEo9vEXpRd6xIl_JWHr7EyDDw">
</div>
<div class="flex-1">
<p class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Alex Rivera</p>
<p class="text-on-surface-variant">Deep Focus Mode Active</p>
</div>
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity">edit</button>
</div>
</div>
</section>
<!-- General Settings -->
<section class="space-y-base">
<h2 class="font-label-caps text-label-caps text-outline mb-base px-base">PREFERENCES &amp; PRIVACY</h2>
<!-- Profile Info Link -->
<button class="w-full glass-card rounded-lg p-md flex items-center justify-between hover:bg-white/10 transition-colors group">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary">person</span>
<span class="font-body-md text-body-md text-on-surface">Profile Info</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Data Export Link -->
<button class="w-full glass-card rounded-lg p-md flex items-center justify-between hover:bg-white/10 transition-colors group">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary">download</span>
<div class="text-left">
<span class="block font-body-md text-body-md text-on-surface">Data Export</span>
<span class="text-xs text-outline">Download your activity archive</span>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Privacy Policy Link -->
<button class="w-full glass-card rounded-lg p-md flex items-center justify-between hover:bg-white/10 transition-colors group">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary">security</span>
<span class="font-body-md text-body-md text-on-surface">Privacy Policy</span>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</section>

<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary">fingerprint</span>
<span class="font-body-md text-body-md text-on-surface">Biometric Unlock</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value="">
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
</section>
<!-- Danger Zone -->
<section class="pt-md">
<div class="glass-card border-error/20 rounded-lg p-md">
<h2 class="font-label-caps text-label-caps text-error mb-base">DANGER ZONE</h2>
<button class="w-full flex items-center justify-between py-base group active:scale-[0.98] transition-transform">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-error">delete_forever</span>

</div>

</div>

<footer class="pt-xl pb-lg text-center">
<p class="font-label-caps text-label-caps text-outline opacity-40">Disciplined Serenity v2.4.0</p>
</footer>
</main>
<!-- Bottom Nav Bar (Suppressed on deep settings pages usually, but kept as per shell logic relevance) -->
<!-- Nav hidden on focused settings to prioritize content canvas -->
<script>
        // Micro-interactions
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('mousedown', () => {
                card.style.transform = 'scale(0.98)';
                card.style.transition = 'transform 0.1s ease-out';
            });
            card.addEventListener('mouseup', () => {
                card.style.transform = 'scale(1)';
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
