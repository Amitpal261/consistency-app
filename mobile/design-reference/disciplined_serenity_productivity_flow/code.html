<style>
        body {
            background-color: #131313;
            overflow: hidden;
        }

        .dot-grid {
            background-image: radial-gradient(rgba(143, 144, 158, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .orb-glow {
            filter: blur(40px);
            background: radial-gradient(circle, rgba(63, 81, 181, 0.6) 0%, rgba(8, 33, 138, 0) 70%);
            animation: pulse-glow 6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .central-orb {
            box-shadow: 0 0 60px 10px rgba(186, 195, 255, 0.15);
            animation: orb-float 8s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.4); }
        }

        @keyframes orb-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes reveal-text {
            0% { opacity: 0; letter-spacing: 0.5em; filter: blur(10px); }
            100% { opacity: 1; letter-spacing: 0.2em; filter: blur(0); }
        }

        .animate-reveal {
            animation: reveal-text 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="flex flex-col items-center justify-center min-h-screen relative dot-grid">
<!-- The Central Orb Component -->
<div class="relative w-64 h-64 flex items-center justify-center mb-16">
<!-- Multi-layered Gaussian Glow -->
<div class="orb-glow absolute inset-0 rounded-full"></div>
<div class="orb-glow absolute inset-0 rounded-full scale-110 opacity-30" style="animation-delay: -3s"></div>
<!-- The Main Orb Surface -->
<div class="central-orb w-32 h-32 rounded-full bg-primary-container relative z-10 border border-primary/20 overflow-hidden">
<!-- Glassmorphic Inner Refraction -->
<div class="absolute inset-0 bg-gradient-to-tr from-on-primary/40 to-transparent"></div>
<div class="absolute inset-0 backdrop-blur-md"></div>
<!-- Subtle Inner Stroke -->
<div class="absolute inset-0 rounded-full border border-white/5 pointer-events-none"></div>
</div>
</div>
<!-- Branding -->
<div class="text-center z-10">
<h1 class="font-label-caps text-label-caps text-on-surface tracking-[0.3em] uppercase animate-reveal">
            Consistency
        </h1>
<p class="font-body-md text-on-surface-variant mt-sm opacity-50 font-light tracking-wide animate-reveal" style="animation-delay: 1.2s;">
            Disciplined Serenity
        </p>
</div>
<!-- Background Atmospheric Interaction Overlay -->
<div class="fixed pointer-events-none w-[600px] h-[600px] rounded-full opacity-10 transition-opacity duration-1000" id="cursor-glow" style="background: radial-gradient(circle, rgba(186, 195, 255, 0.15) 0%, transparent 70%);"></div>
<script>
        // Micro-interaction: Subtle orb follow
        const orb = document.querySelector('.central-orb');
        const container = document.body;
        const cursorGlow = document.getElementById('cursor-glow');

        container.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            
            // Move subtle cursor glow
            cursorGlow.style.left = `${clientX - 300}px`;
            cursorGlow.style.top = `${clientY - 300}px`;
            cursorGlow.style.opacity = '0.2';

            // Parallax effect for the orb
            const moveX = (clientX - window.innerWidth / 2) * 0.02;
            const moveY = (clientY - window.innerHeight / 2) * 0.02;
            
            orb.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        container.addEventListener('mouseleave', () => {
            cursorGlow.style.opacity = '0';
        });

        // Simulating the transition to the main app after the splash
        setTimeout(() => {
            // This would normally trigger a router push or a fade-out animation
            console.log("Splash sequence complete. Transitioning to Dashboard...");
        }, 4000);
    </script>
</body></html>
