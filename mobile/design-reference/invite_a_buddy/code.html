<body class="bg-background text-on-background font-body-md min-h-screen dot-grid flex flex-col items-center justify-center overflow-hidden">
<!-- Top AppBar (Identity Only, no back button per prompt requirements for transaction focus) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-center items-center px-margin-edge py-sm bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-semibold text-on-surface">Consistency</h1>
</header>
<!-- Background Atmospheric Orb -->
<div class="fixed top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] orb-glow animate-pulse-gentle pointer-events-none"></div>
<main class="relative z-10 w-full max-w-md px-margin-edge">
<!-- Main Invitation Card -->
<div class="glass-card rounded-lg p-lg flex flex-col items-center text-center space-y-md shadow-2xl transition-all duration-500 hover:scale-[1.02]">
<!-- Icon Representation -->
<div class="w-16 h-16 rounded-full bg-primary-container/30 flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-primary text-[32px]">group_add</span>
</div>
<!-- Content -->
<div class="space-y-sm">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Add a Buddy</h2>
<p class="font-body-md text-on-surface-variant leading-relaxed">
                    Invite a friend to review your proof when AI is unsure. 
                    Accountability is stronger when shared.
                </p>
</div>
<!-- Visualization of 'Buddy' Concept -->
<div class="w-full flex justify-center -space-x-4 py-md">
<div class="w-12 h-12 rounded-full border-2 border-background overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover" data-alt="A portrait of a smiling young professional woman with a warm, encouraging expression, set against a soft bokeh background of a modern office. The lighting is soft and golden, maintaining a high-end minimalist aesthetic with subtle blue and indigo color accents that align with the app's visual identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCUgGlD95qu25bqIBJmccVxMCeukjuGv8GkyPpsDhVMaGcQrVF5exE01VpBRvZD4pfL2y7eIVjod_pkD75rIfww6OR7cO4K1Gjkd1wzmquxhHlYtP05zeyDFJqfkEzQ0CumINRZbv3EAZ-dxXadYqbs5BBj-Z4ariYcEGYMb9rQ4CV8QqZ0pxH2Rq_lpVBFjA3_OZRcTpRGC_ZmN9XxUsXFpt5S2Ni6mL6fgRJdTElT4KriN5mDBYOXTsNnTw-QV-cU5KiTtJa2Q8w">
</div>
<div class="w-12 h-12 rounded-full border-2 border-background flex items-center justify-center bg-primary-container text-on-primary-container shadow-lg">
<span class="material-symbols-outlined text-sm">link</span>
</div>
<div class="w-12 h-12 rounded-full border-2 border-background bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-outline">person_outline</span>
</div>
</div>
<!-- Action Cluster -->
<div class="w-full flex flex-col gap-sm pt-md">
<button class="w-full bg-primary text-on-primary font-label-caps text-label-caps py-md px-lg rounded-full shadow-lg hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-sm" onclick="handleInvite()">
<span class="material-symbols-outlined text-sm">contacts</span>
                    Invite from Contacts
                </button>
<button class="w-full text-on-surface-variant font-label-caps text-label-caps py-sm px-lg hover:text-on-surface transition-colors" onclick="handleSkip()">
                    Skip for Now
                </button>
</div>
</div>
<!-- Solo Journey Note (Firm but Friendly) -->
<p class="text-center mt-xl text-xs font-label-caps text-outline tracking-widest uppercase opacity-60">
            Continuing solo will prioritize AI-only verification.
        </p>
</main>
<!-- Interactive Layer -->
<script>
        function handleInvite() {
            // Visual feedback for invite action
            const btn = event.currentTarget;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Syncing...';
            setTimeout(() => {
                alert('Contact permissions requested. Connecting your accountability circle.');
                btn.innerHTML = '<span class="material-symbols-outlined text-sm">contacts</span> Invite from Contacts';
            }, 1000);
        }

        function handleSkip() {
            // Transition effect for skipping
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(20px)';
            main.style.transition = 'all 0.5s ease-out';
            
            setTimeout(() => {
                alert('Starting your solo journey. Stay disciplined.');
                // In a real app, this would navigate to the dashboard
                window.location.reload();
            }, 600);
        }
    </script>
