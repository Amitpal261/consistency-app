<style>
    body {
      background-color: #131313;
      background-image: radial-gradient(#353534 1px, transparent 1px);
      background-size: 24px 24px;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(186, 195, 255, 0.2);
    }

    .orb-glow {
      filter: blur(40px);
      background: #3f51b5;
      opacity: 0.4;
      animation: pulse 8s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0.5; }
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex items-center justify-center p-margin-edge overflow-hidden">
<!-- Atmospheric Glow Elements -->
<div class="fixed top-1/4 left-1/2 -translate-x-1/2 w-64 h-64 orb-glow rounded-full -z-10"></div>
<main class="w-full max-w-[480px] z-10">
<!-- Permission Content Card -->
<section class="glass-card rounded-xl p-lg flex flex-col items-center text-center space-y-lg relative overflow-hidden">
<!-- Visual Anchor (Icon Orb) -->
<div class="relative flex items-center justify-center w-24 h-24 rounded-full bg-primary-container/20 border border-primary/30">
<span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'wght' 300;">
          photo_camera
        </span>
<!-- Inner Glow -->
<div class="absolute inset-0 rounded-full border border-primary/10 animate-ping opacity-20"></div>
</div>
<!-- Textual Context -->
<div class="space-y-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
          Camera Access
        </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto">
          We use the camera for quick verification photos to keep you on track and celebrate your daily progress.
        </p>
</div>
<!-- Action Cluster -->
<div class="w-full flex flex-col items-center space-y-md pt-sm">
<button class="w-full py-sm px-xl rounded-full bg-primary text-on-primary font-label-caps text-label-caps hover:opacity-90 active:scale-95 transition-all duration-200 shadow-lg shadow-primary/20">
          Enable Camera
        </button>
<button class="font-label-caps text-label-caps text-on-surface-variant hover:text-on-surface transition-colors duration-200 uppercase tracking-widest">
          Maybe Later
        </button>
</div>
<!-- Supportive Proof (Micro-cards/Bento-style snippet) -->
<div class="w-full grid grid-cols-2 gap-sm mt-lg opacity-60">
<div class="p-sm bg-surface-variant/30 rounded-lg flex items-center space-x-sm border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-[20px]">verified_user</span>
<span class="font-label-caps text-[10px] text-on-surface-variant">Secure Entry</span>
</div>
<div class="p-sm bg-surface-variant/30 rounded-lg flex items-center space-x-sm border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-[20px]">auto_awesome</span>
<span class="font-label-caps text-[10px] text-on-surface-variant">Quick Capture</span>
</div>
</div>
</section>
<!-- Contextual Footer (Non-scary) -->
<footer class="mt-md text-center">
<p class="font-label-caps text-[10px] text-on-surface-variant/50 flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[12px]">lock</span>
        Your data remains private and local to your discipline journey.
      </p>
</footer>
</main>
<!-- Interactive Backdrop Layer -->
<div class="fixed inset-0 pointer-events-none -z-20">
<div class="w-full h-full object-cover opacity-10" data-alt="A macro photography shot of light refracting through a high-end camera lens, displaying soft chromatic aberration and deep indigo bokeh. The lighting is moody and serene, consistent with a premium dark-mode productivity app. Subtle dust motes dance in a soft shaft of light against a deep graphite background." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAst__eA9m2l6zMwm134LqhoPHPng-gN71Ncct5Uqj-cSgPj6CrDpIKXYeLLAog4WJCWd4wylFtqmi-I0HTZwIL5trLAL2-CA9pTs1SxO_K_0SJrtdPLKt0GfzlJGsbAepgXzfia1-rhQ39eao9mZMe-z2MFO9zXMNYxI3ludyYc61baK0K34ZcczrYmIrApcEnOk8of5_nJuEfexAukyTn2B3-FA-lMjcc8tidSgcNrS3DuijzfgcVB-MKeHtq0zPdsPDGUZB8vYo')"></div>
</div>
<script>
    // Subtle mouse tracking for the orb glow
    document.addEventListener('mousemove', (e) => {
      const orb = document.querySelector('.orb-glow');
      const x = e.clientX;
      const y = e.clientY;
      
      const moveX = (x - window.innerWidth / 2) / 20;
      const moveY = (y - window.innerHeight / 2) / 20;
      
      orb.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });

    // Handle button interaction
    const primaryBtn = document.querySelector('button.bg-primary');
    primaryBtn.addEventListener('click', () => {
      // Simulate permission flow
      primaryBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
      setTimeout(() => {
        primaryBtn.innerHTML = 'Access Granted';
        primaryBtn.classList.replace('bg-primary', 'bg-tertiary');
        primaryBtn.classList.replace('text-on-primary', 'text-on-tertiary');
      }, 800);
    });
  </script>
