<style>
        body {
            background-color: #131313;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);

        }

            box-shadow: 0 0 60px 20px rgba(63, 81, 181, 0.15);

<body class="min-h-screen flex flex-col text-on-surface antialiased overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-edge py-sm bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity cursor-pointer">menu</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-semibold text-on-surface dark:text-on-surface">Consistency</h1>
</div>
<div class="text-primary dark:text-primary-fixed-dim font-label-caps text-label-caps tracking-widest uppercase">
            12d Streak
        </div>
</header>
<main class="flex-grow flex items-center justify-center px-margin-edge pt-32 pb-16 relative">
<!-- Background Ambient Orb -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-64 h-64 rounded-full bg-primary-container/10 blur-[100px] pointer-events-none"></div>
<div class="w-full max-w-md relative">
<!-- Header Section -->
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container/20 border border-primary/20 mb-md relative orb-glow">
<span class="material-symbols-outlined text-primary text-3xl">fingerprint</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Begin Your Journey</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Step into a space of quiet accountability.</p>
</div>
<!-- Sign Up Form -->
<form class="glass-card p-lg rounded-lg space-y-xl" onsubmit="event.preventDefault()">
<div class="space-y-lg">
<!-- Email Field -->
<div class="group">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-xs block uppercase tracking-widest">Email Address</label>
<div class="relative flex items-center border-b border-outline-variant/50 input-focus-glow transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant absolute left-0 text-xl">mail</span>
<input class="w-full bg-transparent border-none py-sm pl-md text-on-surface placeholder:text-outline/40 focus:ring-0 font-body-md text-body-md" placeholder="name@example.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-xs block uppercase tracking-widest">Password</label>
<div class="relative flex items-center border-b border-outline-variant/50 input-focus-glow transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant absolute left-0 text-xl">lock</span>
<input class="w-full bg-transparent border-none py-sm pl-md text-on-surface placeholder:text-outline/40 focus:ring-0 font-body-md text-body-md" placeholder="••••••••" type="password">
<button class="absolute right-0 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
</div>
<div class="space-y-md pt-base">
<!-- Primary Action -->
<button class="w-full py-md bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-headline-lg-mobile text-headline-lg-mobile rounded-full transition-all duration-300 active:scale-[0.98] shadow-lg shadow-primary-container/20">
                        Create Account
                    </button>
<!-- Secondary Options -->
<div class="flex items-center justify-center gap-xs pt-sm">
<span class="font-body-md text-body-md text-on-surface-variant">Already have an account?</span>
<a class="font-body-md text-body-md text-primary font-semibold hover:underline decoration-2 underline-offset-4 transition-all" href="#">Login</a>
</div>
</div>
</form>
<!-- Social Proof / Contextual Hint -->
<div class="mt-xl text-center">
<p class="font-label-caps text-label-caps text-outline/60 uppercase tracking-[0.2em]">Privacy is our priority</p>
<div class="flex justify-center gap-md mt-sm opacity-40">
<span class="material-symbols-outlined">shield</span>
<span class="material-symbols-outlined">key</span>
<span class="material-symbols-outlined">verified_user</span>
</div>
</div>
</div>
</main>
<!-- Footer Decoration (Glassmorphic Accent) -->
<footer class="mt-auto py-lg px-margin-edge flex justify-center">
<div class="text-on-surface-variant/40 font-label-caps text-label-caps tracking-widest uppercase">
            © 2024 Consistency Labs
        </div>
</footer>
<!-- Interactive Layer: Ambient Pulsing Orb (WebGL-like feel with CSS) -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden" id="orb-container">
<div class="absolute -bottom-1/4 -right-1/4 w-[600px] h-[600px] bg-primary/5 blur-[120px] rounded-full animate-pulse"></div>
<div class="absolute -top-1/4 -left-1/4 w-[400px] h-[400px] bg-primary-container/5 blur-[100px] rounded-full"></div>
</div>
<script>
        // Subtle micro-interaction for input fields
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('border-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('border-primary');
            });
        });

        // Add visual feedback on primary button click
        const btn = document.querySelector('button');
        btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
        btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
    </script>
