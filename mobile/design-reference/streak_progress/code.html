<script>
        // Micro-interaction for the current day heatmap pulse
        const pulseTarget = document.getElementById('current-day-pulse');
        if (pulseTarget) {
            let opacity = 1;
            let growing = false;
            setInterval(() => {
                if (growing) {
                    opacity += 0.01;
                    if (opacity >= 1) growing = false;
                } else {
                    opacity -= 0.01;
                    if (opacity <= 0.4) growing = true;
                }
                pulseTarget.style.opacity = opacity;
            }, 30);
        }
    </script>
