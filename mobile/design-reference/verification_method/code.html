<!DOCTYPE html><html class="dark" lang="en" style="width: 390px; height: 1337px; overflow: hidden; position: relative;"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Verification Method Picker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&amp;family=Open+Sans:wght@400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&amp;family=Open+Sans:wght@100..900&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(186, 195, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(186, 195, 255, 0.4);
            transform: translateY(-2px);
        }
        .glass-card.active {
            background: rgba(186, 195, 255, 0.1);
            border-color: rgba(186, 195, 255, 0.6);
            box-shadow: 0 0 20px rgba(186, 195, 255, 0.1);
        }
        .dot-grid {
            background-image: radial-gradient(rgba(186, 195, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .orb-glow {
            filter: blur(40px);
            animation: pulse-glow 4s ease-in-out infinite;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#5b4300",
                        "on-surface": "#e5e2e1",
                        "tertiary-container": "#745600",
                        "surface-container-low": "#1c1b1b",
                        "inverse-on-surface": "#313030",
                        "on-tertiary-fixed": "#261a00",
                        "background": "#131313",
                        "inverse-primary": "#4355b9",
                        "surface-variant": "#353534",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-bright": "#393939",
                        "secondary-fixed": "#e4e2e1",
                        "outline-variant": "#454652",
                        "secondary-container": "#474747",
                        "inverse-surface": "#e5e2e1",
                        "on-primary-fixed": "#00105c",
                        "primary-container": "#3f51b5",
                        "on-secondary": "#303030",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#131313",
                        "on-tertiary-container": "#ffcc55",
                        "error": "#ffb4ab",
                        "on-error": "#690005",
                        "primary-fixed-dim": "#bac3ff",
                        "on-secondary-fixed-variant": "#474747",
                        "surface": "#131313",
                        "surface-container-high": "#2a2a2a",
                        "surface-container-highest": "#353534",
                        "surface-tint": "#bac3ff",
                        "tertiary": "#fabd00",
                        "surface-container": "#201f1f",
                        "secondary": "#c8c6c6",
                        "tertiary-fixed": "#ffdf9e",
                        "primary-fixed": "#dee0ff",
                        "primary": "#bac3ff",
                        "on-surface-variant": "#c5c5d4",
                        "on-tertiary": "#3f2e00",
                        "on-secondary-container": "#b6b5b4",
                        "on-primary-fixed-variant": "#293ca0",
                        "on-primary-container": "#cacfff",
                        "tertiary-fixed-dim": "#fabd00",
                        "on-background": "#e5e2e1",
                        "outline": "#8f909e",
                        "on-secondary-fixed": "#1b1c1c",
                        "secondary-fixed-dim": "#c8c6c6",
                        "error-container": "#93000a",
                        "on-primary": "#08218a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "margin-edge": "24px",
                        "base": "8px",
                        "xl": "64px",
                        "lg": "40px",
                        "gutter": "16px",
                        "sm": "12px",
                        "md": "24px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Montserrat"],
                        "body-md": ["Open Sans"],
                        "timer-numeric": ["Montserrat"],
                        "label-caps": ["Montserrat"],
                        "display-orb": ["Montserrat"],
                        "headline-lg": ["Montserrat"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "timer-numeric": ["24px", {"lineHeight": "32px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "display-orb": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md text-body-md min-h-screen dot-grid flex flex-col overflow-x-hidden">
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-edge py-sm bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30">
<div class="flex items-center gap-base">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200">arrow_back</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-semibold text-on-surface">Consistency</h1>
</div>
<div class="text-primary font-label-caps text-label-caps">12d Streak</div>
</header>
<main class="flex-1 flex flex-col items-center px-margin-edge pt-32 pb-40 w-full max-w-xl mx-auto">
<!-- The Central Orb -->
<div class="relative w-48 h-48 mb-12 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/20 rounded-full orb-glow"></div>
<div class="z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-5xl mb-2" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-caps text-label-caps text-primary tracking-widest uppercase">Select Method</span>
</div>
</div>
<div class="w-full space-y-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-center text-on-surface mb-gutter">Choose your path to accountability</h2>
<!-- Selection Cards -->
<div class="space-y-gutter w-full" id="method-picker">
<!-- Photo Proof -->
<button class="glass-card w-full p-md rounded-lg flex items-start gap-md text-left active:scale-[0.98] transition-transform" onclick="selectMethod(this)">
<div class="bg-primary-container text-on-primary-container p-sm rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
<div>
<h3 class="font-headline-lg-mobile text-xl font-bold mb-xs">Photo Proof</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">Capture a visual timestamp of your commitment. Ideal for gym check-ins or completed physical tasks.</p>
<div class="mt-base flex items-center gap-xs">
<span class="w-1.5 h-1.5 rounded-full bg-tertiary"></span>
<span class="font-label-caps text-[10px] text-tertiary uppercase tracking-tighter">High Visual Impact</span>
</div>
</div>
</button>
<!-- GPS Check-in -->
<button class="glass-card w-full p-md rounded-lg flex items-start gap-md text-left active:scale-[0.98] transition-transform" onclick="selectMethod(this)">
<div class="bg-secondary-container text-on-secondary-container p-sm rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div>
<h3 class="font-headline-lg-mobile text-xl font-bold mb-xs">GPS Check-in</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">Verify your location with satellite precision. Best for recurring habits at specific venues or studios.</p>
<div class="mt-base flex items-center gap-xs">
<span class="w-1.5 h-1.5 rounded-full bg-primary"></span>
<span class="font-label-caps text-[10px] text-primary uppercase tracking-tighter">Effortless Tracking</span>
</div>
</div>
</button>
<!-- Dual Verification -->
<button class="glass-card w-full p-md rounded-lg flex items-start gap-md text-left active:scale-[0.98] transition-transform" onclick="selectMethod(this)">
<div class="bg-primary text-on-primary p-sm rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<div>
<h3 class="font-headline-lg-mobile text-xl font-bold mb-xs">Dual Verification</h3>
<p class="text-on-surface-variant text-sm leading-relaxed">The ultimate accountability standard. Combines photo proof and GPS location for iron-clad consistency.</p>
<div class="mt-base flex items-center gap-xs">
<span class="w-1.5 h-1.5 rounded-full bg-[#ffcc55] animate-pulse"></span>
<span class="font-label-caps text-[10px] text-on-tertiary-container uppercase tracking-tighter">Elite Commitment</span>
</div>
</div>
</button>
</div>
</div>
</main>
<!-- Floating Action Row -->
<div class="fixed bottom-0 left-0 w-full px-margin-edge pb-xl pt-lg bg-gradient-to-t from-background via-background/90 to-transparent z-40">
<div class="max-w-xl mx-auto flex gap-gutter">
<button class="flex-1 bg-surface-container-highest text-on-surface font-label-caps text-label-caps py-md px-lg rounded-full border border-outline-variant/30 hover:bg-surface-variant transition-colors active:scale-95">
                CANCEL
            </button>
<button class="flex-[2] bg-primary text-on-primary font-label-caps text-label-caps py-md px-lg rounded-full shadow-lg shadow-primary/20 hover:opacity-90 disabled:opacity-30 disabled:grayscale transition-all active:scale-95 flex items-center justify-center gap-xs" disabled="" id="continue-btn">
                CONTINUE <span class="material-symbols-outlined text-[18px]">chevron_right</span>
</button>
</div>
</div>
<!-- Bottom Nav Bar (Suppressed on this transactional screen as per logic, but placeholder for structure) -->
<!-- The BottomNavBar is suppressed here because this is a focused task-focused screen (method picker). -->
<script>
        function selectMethod(element) {
            // Remove active class from all
            document.querySelectorAll('.glass-card').forEach(card => {
                card.classList.remove('active');
            });
            
            // Add active class to selected
            element.classList.add('active');
            
            // Enable continue button
            const btn = document.getElementById('continue-btn');
            btn.disabled = false;
            
            // Micro-interaction: Scroll into view if needed
            element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            // Trigger a light haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }
    </script>
</body></html>
