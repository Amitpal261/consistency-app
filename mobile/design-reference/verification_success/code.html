<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&amp;family=Open+Sans:wght@400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 0.8; filter: blur(40px); }
            50% { transform: scale(1.15); opacity: 1; filter: blur(55px); }
        }

        .orb-glow {
            animation: pulse-glow 4s ease-in-out infinite;
        }

        .dot-grid {
            background-image: radial-gradient(circle, rgba(186, 195, 255, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(186, 195, 255, 0.1);
        }

        .inner-shine {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide-up {
            animation: slide-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
    </style>

<body class="bg-surface text-on-surface font-body-md overflow-hidden min-h-screen flex flex-col items-center justify-center relative">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-edge py-sm bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30">

<span class="material-symbols-outlined text-primary">menu</span>

</div>
<div class="text-primary font-label-caps tracking-widest bg-primary-container/20 px-sm py-xs rounded-full">
            12d Streak
        </div>
</header>
<!-- Main Success Canvas -->
<main class="relative z-10 w-full max-w-lg px-margin-edge flex flex-col items-center text-center">
<!-- The Central Orb Success State -->
<div class="relative mb-xl mt-lg">
<!-- Glow Effect Layer -->
<div class="absolute inset-0 bg-primary-container rounded-full orb-glow opacity-40 blur-[40px] scale-150" style="transform: translate(-1.73333px, -6.17778px) scale(1.15);"></div>
<!-- Core Orb -->
<div class="relative w-48 h-48 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-2xl shadow-primary-container/50 inner-shine animate-slide-up mt-[20px] mt-[15px] mt-[10px] pt-[10px]">
<span class="material-symbols-outlined text-white text-[96px] scale-110" style="font-variation-settings: 'FILL' 1;">
                    check_circle
                </span>
</div>
</div>
<!-- Success Content -->
<div class="animate-slide-up delay-1 opacity-0">
<div class="inline-flex items-center gap-xs px-sm py-xs bg-primary/10 rounded-full border border-primary/20 mb-md">
<span class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_rgba(186,195,255,1)]"></span>
<span class="font-label-caps text-primary uppercase tracking-[0.2em]">Verified</span>
</div>
<h1 class="font-display-orb text-display-orb text-on-surface mb-sm tracking-tight leading-none">
                25 Day Streak!
            </h1>
<p class="font-body-md text-on-surface-variant text-lg max-w-xs mx-auto mb-xl">
                Consistency is its own reward. You have secured today's commitment.
            </p>
</div>
<!-- Action Area -->
<div class="w-full flex flex-col gap-md animate-slide-up delay-2 opacity-0">
<button class="w-full py-md px-lg bg-primary text-on-primary font-label-caps text-base rounded-full shadow-lg shadow-primary/20 hover:opacity-90 active:scale-95 transition-all duration-200" onclick="window.location.reload()">
                RETURN TO DASHBOARD
            </button>
<div class="glass-card inner-shine rounded-lg p-md flex items-center justify-between">
<div class="text-left">
<p class="font-label-caps text-on-surface-variant opacity-60">NEXT MILESTONE</p>
<p class="font-headline-lg-mobile text-on-surface">30 Days Focus</p>
</div>
<div class="flex items-center gap-xs">
<span class="font-timer-numeric text-primary">5</span>
<span class="font-label-caps text-on-surface-variant">LEFT</span>
</div>
</div>
</div>
</main>
<!-- Bottom Shell Context (BottomNavBar minimized or suppressed for transaction screen focus) -->
<!-- Applying Shared Component logic: "Icons Only" type -->
<nav class="fixed bottom-md left-1/2 -translate-x-1/2 w-[calc(100%-48px)] max-w-sm rounded-lg bg-surface/10 backdrop-blur-md border border-primary/30 shadow-lg flex justify-around items-center px-lg py-sm z-50">

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">analytics</span>
</a>
<a class="flex items-center justify-center text-secondary w-12 h-12 hover:bg-on-surface/5 rounded-full transition-colors active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined">settings</span>
</a>
</nav>
<!-- Decorative Atmosphere -->
<div class="fixed top-1/4 -right-24 w-64 h-64 bg-primary/10 blur-[100px] rounded-full z-0"></div>
<div class="fixed bottom-1/4 -left-24 w-80 h-80 bg-primary-container/10 blur-[120px] rounded-full z-0"></div>
<script>
        // Micro-interaction for the orb
        const orb = document.querySelector('.orb-glow');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            orb.style.transform = `translate(${xAxis}px, ${yAxis}px) scale(1.15)`;
        });
    </script>
