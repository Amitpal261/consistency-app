        .dot-grid {
            background-image: radial-gradient(circle, #e5e2e1 1px, transparent 1px);

        }
        .orb-glow {
            filter: blur(40px);
            background: #bac3ff;
            opacity: 0.15;
            transition: all 1s ease-in-out;
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.1); opacity: 0.25; }
        }
        .animate-pulse-soft {

<body class="font-body-md min-h-screen flex flex-col items-center justify-center overflow-hidden dot-grid bg-[#000000] text-on-background">

<!-- Main Content Canvas -->

<div class="w-48 h-48 rounded-full bg-cover bg-center border-4 border-white/50 shadow-2xl relative z-10 overflow-hidden" data-alt="A macro close-up of a high-end luxury watch movement, with polished silver gears and a deep indigo background. The lighting is soft and cinematic, highlighting the mechanical precision and 'Disciplined Serenity' aesthetic. Soft light-mode colors like off-white and pale lavender are used for the highlights." style="background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuBXRDItygUp-DK_JAHRCBSltcn07u9E3B9xgjGrQ0Td6f_NUdAG198QG2wryp3zLaA23_2oHNne-eYDki2OvOB7s8Z2balMSyE5apCKNPffok0l5qZ9B46DTCZI6-wxfFW1lDY9F-ZukeJq5T1fir0srdD4rstHto0Paku-jiFPIMRQY2ZtnwYJ7VKQp-qfaz1I2ZAhnLRbYTDp4264GXjqn4LZP0ZAXSBbJaYAT9yvNEpJ61O-pQMZhwCcLZQIa0RJ8wODTRLwf2U&quot;);">

<span class="material-symbols-outlined text-[18px] text-primary" style="font-variation-settings: &quot;FILL&quot; 1;">verified</span>

</div>
</div>

</div>
</div>

<div class="w-full mt-xl flex flex-col items-center space-y-lg">
<!-- Pagination Dots -->

</div>

<button class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors px-md py-sm">
                    Skip
                </button>
<button class="group relative flex items-center justify-center bg-primary text-on-primary font-label-caps text-label-caps py-sm px-xl rounded-full shadow-lg shadow-primary/20 active:scale-95 transition-all" onclick="window.location.reload()">
<span class="">Next</span>

</button>
</div>
</div>
</main>
<!-- Decorative Elements -->
<div class="absolute bottom-[-100px] left-[-100px] w-64 h-64 bg-tertiary/10 rounded-full blur-[80px] pointer-events-none"></div>
<div class="absolute top-[-50px] right-[-50px] w-48 h-48 bg-primary/10 rounded-full blur-[60px] pointer-events-none"></div>
<script>
        // Micro-interaction for the next button and parallax
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const orb = document.querySelector('.orb-glow');
            orb.style.transform = `translate(calc(-50% + ${(x - 0.5) * 50}px), calc(-50% + ${(y - 0.5) * 50}px))`;
            
            const card = document.querySelector('.glass-card');
            card.style.transform = `perspective(1000px) rotateY(${(x - 0.5) * 5}deg) rotateX(${(y - 0.5) * -5}deg)`;
        });

        // Soft pulse state management
        let isSuccess = true;
        const orb = document.querySelector('.orb-glow');
        setInterval(() => {
            if (isSuccess) {
                orb.style.background = '#bac3ff'; // Primary Glow
            } else {
                orb.style.background = '#fabd00'; // Success/Amber Glow
            }
            isSuccess = !isSuccess;
        }, 8000);
    </script>
